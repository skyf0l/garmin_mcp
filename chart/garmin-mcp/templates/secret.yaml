{{- if not .Values.garmin.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "garmin-mcp.fullname" . }}
  labels:
    {{- include "garmin-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- if include "garmin-mcp.tokenMode" . }}
  # Pre-generated OAuth tokens. login() accepts the JSON inline via $GARMINTOKENS.
  GARMINTOKENS: {{ include "garmin-mcp.tokenJSON" . | quote }}
{{- else }}
{{- if or (not .Values.garmin.email) (not .Values.garmin.password) }}
{{- fail "Provide garmin.tokens.json/base64, OR garmin.email + garmin.password, OR garmin.existingSecret" }}
{{- end }}
  GARMIN_EMAIL: {{ .Values.garmin.email | quote }}
  GARMIN_PASSWORD: {{ .Values.garmin.password | quote }}
{{- end }}
{{- end }}
