{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) (not (include "garmin-mcp.tokenMode" .)) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "garmin-mcp.pvcName" . }}
  labels:
    {{- include "garmin-mcp.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
